services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME:-jumpstart}
      MYSQL_USER: ${DB_USERNAME:-jumpstart}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jumpstart}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3310:3306"
    volumes:
      - jumpstart-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - jumpstart

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-jumpstart}
      DB_USERNAME: ${DB_USERNAME:-jumpstart}
      DB_PASSWORD: ${DB_PASSWORD:-jumpstart}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string-before-deploying}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    ports:
      - "8081:8080"
    networks:
      - jumpstart

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"
    networks:
      - jumpstart

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8094:8080"
    networks:
      - jumpstart

volumes:
  jumpstart-db-data:

networks:
  jumpstart:
    driver: bridge
