services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-jumpstart}
      MYSQL_USER: ${DB_USERNAME:-jumpstart}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jumpstart}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3301:3306"
    volumes:
      - jumpstart-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      PORT: 8081
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-jumpstart}
      DB_USERNAME: ${DB_USERNAME:-jumpstart}
      DB_PASSWORD: ${DB_PASSWORD:-jumpstart}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string-before-deploying}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8085:8080"

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8097:8080"

volumes:
  jumpstart-db-data:
