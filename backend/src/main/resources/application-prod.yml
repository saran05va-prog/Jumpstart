spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jumpstart}?useSSL=${DB_SSL_ENABLED:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000
    username: ${DB_USERNAME:jumpstart}
    password: ${DB_PASSWORD:jumpstart}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

server:
  port: ${PORT:8080}
  error:
    include-message: on-param
    include-stacktrace: NEVER

jumpstart:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-to-a-long-random-string}
      access-expiration-ms: 900000
      refresh-expiration-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    root: INFO
    com.jumpstart: INFO
    org.springframework.web: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db