spring:
  jpa:
    show-sql: false

server:
  port: ${PORT:8080}
  error:
    include-message: on-param
    include-stacktrace: NEVER

jumpstart:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-to-a-long-random-string}
      access-expiration-ms: 900000
      refresh-expiration-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    root: INFO
    com.jumpstart: INFO
    org.springframework.web: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db
