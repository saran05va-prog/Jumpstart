spring:
  datasource:
    url: "jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=REQUIRED&serverTimezone=UTC&connectTimeout=10000"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false

server:
  port: ${PORT:8080}
  error:
    include-message: on-param
    include-stacktrace: NEVER

jumpstart:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    root: INFO
    com.jumpstart: INFO
    org.springframework.web: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db
