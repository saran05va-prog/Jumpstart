spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:jumpstart}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:jumpstart}
    password: ${DB_PASSWORD:jumpstart}
  jpa:
    show-sql: true

logging:
  level:
    com.jumpstart: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
